name: Termux Builder

on:
  push:
    branches: [ main ]
    paths: [ 'recipes/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'recipes/**' ]

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Get changed version folders
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          dir_names: true
          dir_names_max_depth: 3 # recipes(1)/name(2)/version(3)
          json: true
          files: recipes/**

      - name: Set Matrix Data
        id: set-matrix
        run: |
          echo "matrix=${{ steps.changed-files.outputs.all_changed_files }}" >> $GITHUB_OUTPUT

  build-version:
    needs: detect-versions
    if: ${{ needs.detect-versions.outputs.any_changed == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        version_dir: ${{ fromJson(needs.detect-versions.outputs.matrix) }}
        arch: [aarch64, arm, x86_64, i686]
        include:
          - arch: aarch64
            platform: linux/arm64
            image_tag: aarch64
            runner: ubuntu-24.04-arm
          - arch: arm
            platform: linux/arm/v7
            image_tag: arm
            runner: ubuntu-24.04-arm
          - arch: x86_64
            platform: linux/amd64
            image_tag: x86_64
            runner: ubuntu-latest
          - arch: i686
            platform: linux/386
            image_tag: i686
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check architecture support
        id: check_arch
        run: |
          RECIPE_PATH="${{ matrix.version_dir }}/recipe.yaml"
          if [ -f "$RECIPE_PATH" ]; then
            EXCLUDED_ARCHES=$(yq '.build.exclude_arches[]?' "$RECIPE_PATH" 2>/dev/null || true)

            if echo "$EXCLUDED_ARCHES" | grep -qw "${{ matrix.arch }}"; then
              echo "Architecture ${{ matrix.arch }} is excluded in recipe.yaml. Skipping."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No recipe.yaml found. Skipping"
          fi

      - name: Register QEMU (arm)
        if: matrix.arch == 'arm' && steps.check_arch.outputs.skip != 'true'
        run: docker run --rm --privileged aptman/qus -s -- -p arm

      - name: Build (${{ matrix.version_dir }})
        if: steps.check_arch.outputs.skip != 'true'
        run: |
          mkdir -p "dist/${{ matrix.arch }}"
          chmod -R 777 dist/

          docker run --rm --privileged \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/data/data/com.termux/files/home/workspace" \
            termux/termux-docker:${{ matrix.image_tag }} \
            bash -c '
              export TERM=xterm-256color
              ln -s /data/data/com.termux/files/usr/etc/termux/mirrors/default /data/data/com.termux/files/usr/etc/termux/chosen_mirrors

              pkg upgrade --quiet -y -o Dpkg::Options::="--force-confnew"
              pkg install --quiet -y python python-pip build-essential clang cmake make binutils patchelf git autoconf automake rust

              pip install termux-pip

              tpip setup
              pip install termux-pip[build]

              cd $HOME/workspace

              if [ -f "${{ matrix.version_dir }}/recipe.yaml" ]; then
                echo "--- Building: ${{ matrix.version_dir }} ---"
                tpip build "${{ matrix.version_dir }}/recipe.yaml" --wheel-dir ./dist/${{ matrix.arch }}
                tpip repair ./dist/*/*
              else
                echo "Skipping ${{ matrix.version_dir }}: no recipe.yaml found at this level."
              fi
            '

      - name: Upload Artifact
        if: steps.check_arch.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}-${{ strategy.job-index }}
          path: dist/

  upload:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-version
    runs-on: ubuntu-latest
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v7
        with:
          pattern: packages-*
          path: upload/
          merge-multiple: true

      - name: Upload wheels
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: |
          aws s3 cp upload/ s3://${{ vars.S3_BUCKET_NAME }}/wheels/ \
            --endpoint-url ${{ vars.S3_ENDPOINT_URL }} \
            --acl public-read \
            --recursive
